<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <title>PIXI</title>


    <!-- font awasome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- font linki -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jersey+15&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
        rel="stylesheet">


</head>

<body>
    <nav class="nav-profile">

        <div class="admin-profile">
            <div class="admin-profile-img"><img src="/img/readmore-re8-2.jpeg" alt=""></div>
            <h3 class="admin-name">Sevinc Super</h3>
        </div>
        <hr class="nav-hr">
        <ul class="admin-ul">
            <li><a href=""><span class="hover-profile active-hover-profile">Statistics</span></a></li>
            <li><a href=""><span class="hover-profile">Users</span></a></li>
            <li><a href=""><span class="hover-profile">Games</span></a></li>
            <li><a href=""><span class="hover-profile">Categories</span></a></li>
            <li><a href=""><span class="hover-profile">Orders</span></a></li>
            <li><a href=""><span class="back-to-site"><i class="fa-solid fa-arrow-left"></i> Back to Site</span></a>
            </li>
        </ul>
    </nav>


    <div class="right-side">
        <div class="search-profile-nav admin-nav">
            <div class="search-profile ">
                <h2 class="admin-h2">Admin Dashboard</h2>
            </div>
        </div>

        <div class="right-side-container">
            <h2 class="admin-dash-h2">Edit/Add</h2>
            <div class="form-container">
                <p> <a href="" class="back-btn">
                        < </a>
                </p>
                <form action="">
                    <div class="btns-label">
                        <label for="file-edit" class="file-edit-btn">ADDITIONAL
                            IMAGES <input id="file-edit" type="file" multiple></label>
                        <label for="main-img-file" class="main-img-file-label">MAIN IMAGE</label> <input
                            id="main-img-file" type="file">

                    </div>

                    <div class="images">
                        <div class="additional-game-imgs">
                            <div class="add-img"><img src="/img/readmore-outlast-3.png" alt=""></div>
                            <div class="add-img"><img src="/img/readmore-outlast-3.png" alt=""></div>
                            <div class="add-img"><img src="/img/readmore-outlast-3.png" alt=""></div>

                        </div>
                        <div class="main-game-img">
                            <div class="main-img"><img src="/img/game_1.jpg" alt=""></div>
                        </div>
                    </div>
                    <div class="cat-img-change">
                        <label for="category-select" class="category-label">Category: <select name=""
                                id="category-select">
                                <option value="">Category</option>
                                <option value="">Horror</option>
                                <option value="">Adventure</option>
                                <option value="">Action</option>
                            </select></label>
                    </div>

                    <div class="input-edit-add-games">
                        <input type="text" placeholder="Name">
                        <input type="text" placeholder="Devoloper">
                        <input type="number" placeholder="Rating">
                        <input type="number" placeholder="Price">
                        <textarea name="" id="" placeholder="Description"></textarea>
                    </div>
                    <button class="edit-add-btn">EDIT</button>


                </form>
            </div>

        </div>

    </div>





    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="pixi.js"></script>
</body>

</html>
